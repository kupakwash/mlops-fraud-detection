name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ app.py \
            --max-line-length=120 \
            --ignore=E501,W503,E702 \
            --exclude=__pycache__

  # ── Job 2: Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost imbalanced-learn \
                      joblib pyyaml fastapi httpx pytest pydantic uvicorn scipy mlflow

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_api.py

  # ── Job 3: Full ML Pipeline ────────────────────────────────────────────────
  train:
    name: ML Pipeline (ingest → train → evaluate)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      MLFLOW_TRACKING_URI: ./mlruns

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost imbalanced-learn \
                      joblib pyyaml mlflow "dvc[azure]" \
                      fastapi uvicorn pydantic python-dotenv \
                      scipy matplotlib seaborn

      - name: Configure DVC Azure remote credentials
        run: |
          dvc remote modify myremote account_name "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}"
          dvc remote modify myremote account_key "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}"

      - name: Pull dataset from Azure Blob Storage
        run: dvc pull data/raw/creditcard.csv

      - name: Stage 1 — Ingest
        run: python src/pipeline/ingest.py

      - name: Stage 2 — Preprocess
        run: python src/pipeline/preprocess.py

      - name: Stage 3 — Train
        run: python src/pipeline/train.py

      - name: Stage 4 — Evaluate
        run: python src/pipeline/evaluate.py

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: reports/

  # ── Job 4: Show Metrics ────────────────────────────────────────────────────
  metrics:
    name: Metrics Report
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download pipeline outputs
        uses: actions/download-artifact@v4
        with:
          name: pipeline-outputs
          path: reports/

      - name: Display metrics
        run: |
          echo "============================================"
          echo "         ML Pipeline Results"
          echo "============================================"
          echo ""
          echo "--- Training Metrics (reports/metrics.json) ---"
          cat reports/metrics.json
          echo ""
          echo "--- Evaluation Metrics (reports/eval_metrics.json) ---"
          cat reports/eval_metrics.json
          echo ""
          echo "--- Drift Report Summary ---"
          python3 -c "
          import json
          with open('reports/drift_report.json') as f:
              d = json.load(f)
          print(f'Features checked : {d[\"total_features_checked\"]}')
          print(f'Drifted features : {d[\"drifted_features_count\"]}')
          print(f'Drift detected   : {d[\"drift_detected\"]}')
          if d['drifted_features']:
              print(f'Drifted in       : {d[\"drifted_features\"]}')
          "
          echo "============================================"
