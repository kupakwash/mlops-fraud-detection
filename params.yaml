# ── Data Parameters ───────────────────────────────────────────────
data:
  raw_path: data/raw/creditcard.csv
  processed_dir: data/processed/
  test_size: 0.2
  random_state: 42

# ── Preprocessing Parameters ──────────────────────────────────────
preprocess:
  scale_features:
    - Amount
    - Time
  smote_random_state: 42

# ── Model Hyperparameters ─────────────────────────────────────────
model:
  n_estimators: 150
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  use_label_encoder: false
  eval_metric: auc
  random_state: 42
  # scale_pos_weight computed dynamically from class ratio

# ── Evaluation Thresholds ─────────────────────────────────────────
evaluate:
  threshold: 0.5
  min_auc_roc: 0.95       # CI/CD gate: pipeline fails if below this

# ── MLflow ────────────────────────────────────────────────────────
mlflow:
  experiment_name: fraud-detection
  model_name: fraud_xgboost
  tracking_uri: ./mlruns
